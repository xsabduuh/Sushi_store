<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>سوشي زن | متجر ذكي بخبرات رياضية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background: #0a0a0a;
            color: #f5ede0;
            overflow-x: hidden;
            position: relative;
        }
        /* خلفية متحركة */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }
        .shape {
            position: absolute;
            background: radial-gradient(circle, rgba(255,140,50,0.2), transparent);
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            filter: blur(80px);
            animation: float 20s infinite alternate;
        }
        .shape1 { width: 500px; height: 500px; top: -200px; left: -150px; }
        .shape2 { width: 600px; height: 600px; bottom: -250px; right: -200px; background: radial-gradient(circle, rgba(255,80,40,0.15), transparent); animation-duration: 30s; }
        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(30px, 40px) rotate(8deg); }
        }
        header {
            position: sticky;
            top: 0;
            background: rgba(10,10,10,0.85);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255,140,50,0.3);
            padding: 15px 0;
            z-index: 100;
        }
        .container {
            width: 90%;
            max-width: 1400px;
            margin: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffaa66, #ff6633);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo-icon {
            background: #ff884d;
            width: 55px;
            height: 55px;
            border-radius: 35% 65% 70% 30% / 40% 45% 55% 60%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }
        nav a, .filter-btn, .btn-add, .btn-primary, .cart-qty-btn, .remove-item {
            cursor: pointer;
            transition: 0.2s;
        }
        nav a {
            text-decoration: none;
            font-weight: 600;
            color: #f5ede0;
            padding: 8px 20px;
            border-radius: 40px;
        }
        nav a.active, nav a:hover {
            background: #ff884d;
            color: #0a0a0a;
        }
        .controls {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
            margin: 30px 0;
        }
        .search-box input {
            width: 100%;
            padding: 12px 20px;
            border-radius: 60px;
            background: rgba(255,255,240,0.1);
            border: 1px solid rgba(255,140,50,0.4);
            color: white;
            font-family: inherit;
        }
        .filter-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .filter-btn {
            background: rgba(255,255,240,0.05);
            border: 1px solid rgba(255,140,50,0.5);
            padding: 6px 18px;
            border-radius: 50px;
            color: #f5ede0;
        }
        .filter-btn.active, .filter-btn:hover {
            background: #ff884d;
            color: #0a0a0a;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 35px;
            margin: 40px 0;
        }
        .menu-card {
            background: rgba(20,20,20,0.7);
            backdrop-filter: blur(10px);
            border-radius: 50px 20px 50px 20px;
            padding: 20px;
            transition: 0.3s;
            border: 1px solid rgba(255,140,50,0.3);
            cursor: pointer;
        }
        .menu-card:hover {
            transform: translateY(-8px);
            border-color: #ff884d;
        }
        .card-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 40px 15px 40px 15px;
            margin-bottom: 15px;
        }
        .menu-card h3 { font-size: 1.5rem; margin: 10px 0; }
        .price { font-size: 1.5rem; font-weight: 800; color: #ffaa66; }
        .btn-add {
            background: #ff884d;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 40px;
            font-weight: bold;
            margin-top: 12px;
        }
        /* السلة المتطورة */
        .modal, .product-modal {
            display: none;
            position: fixed;
            z-index: 1001;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            align-items: center;
            justify-content: center;
        }
        .modal-content, .product-modal-content {
            background: #1e1e1e;
            width: 90%;
            max-width: 600px;
            border-radius: 80px 30px 80px 30px;
            padding: 30px;
            border: 1px solid #ff884d;
            max-height: 90vh;
            overflow-y: auto;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #ff884d40;
        }
        .cart-summary {
            background: rgba(255,140,50,0.1);
            padding: 15px;
            border-radius: 30px;
            margin: 15px 0;
        }
        .discount-input {
            display: flex;
            gap: 10px;
            margin: 15px 0;
        }
        .discount-input input {
            flex: 1;
            padding: 10px;
            border-radius: 50px;
            border: none;
        }
        .btn-sm {
            background: #ff884d;
            padding: 8px 15px;
            border-radius: 50px;
            font-weight: bold;
        }
        .suggestions {
            margin-top: 20px;
            border-top: 1px solid #ff884d;
            padding-top: 15px;
        }
        .suggestion-item {
            display: inline-block;
            background: #2c2b28;
            margin: 5px;
            padding: 5px 12px;
            border-radius: 50px;
            cursor: pointer;
        }
        @media (max-width: 700px) {
            .container { flex-direction: column; }
        }
    </style>
</head>
<body>
<div class="animated-bg"><div class="shape shape1"></div><div class="shape shape2"></div></div>

<header>
    <div class="container">
        <div class="logo"><div class="logo-icon">🍣</div><span>سوشي <strong>زن</strong></span></div>
        <nav>
            <a href="#" data-page="menu" class="active">المانيو</a>
            <a href="#" data-page="about">من نحن</a>
            <a href="#" id="cartIconBtn">🛒 <span id="cartCount">0</span></a>
        </nav>
    </div>
</header>

<main id="app">
    <div class="container">
        <div id="menuPage" class="page active-page">
            <div class="controls">
                <div class="search-box"><input type="text" id="searchInput" placeholder="🔍 ابحث عن سوشي..."></div>
                <div class="filter-buttons" id="filterButtons">
                    <button class="filter-btn active" data-cat="all">الكل</button>
                    <button class="filter-btn" data-cat="لفائف">لفائف</button>
                    <button class="filter-btn" data-cat="ساشيمي">ساشيمي</button>
                    <button class="filter-btn" data-cat="مقلي">مقلي</button>
                    <button class="filter-btn" data-cat="نباتي">نباتي</button>
                </div>
            </div>
            <div id="menuContainer" class="menu-grid"></div>
        </div>
        <div id="aboutPage" class="page">
            <div class="about-content" style="background: rgba(0,0,0,0.5); backdrop-filter: blur(12px); border-radius: 80px 30px; padding: 40px;">
                <h2>🍱 عن سوشي زن</h2>
                <p>أفضل سوشي ياباني بأفكار عصرية، نستخدم صورًا حقيقية لأطباقنا، ونسعى لتقديم تجربة ذكية عبر نظام نقاط وخصومات ديناميكية.</p>
                <p><i class="fas fa-map-marker-alt"></i> شارع السوشي، مجمع زن</p>
                <p><i class="fas fa-clock"></i> 12 ظهراً - 12 ليلاً</p>
            </div>
        </div>
    </div>
</main>

<!-- مودال تفاصيل المنتج -->
<div id="productModal" class="product-modal">
    <div class="product-modal-content">
        <span class="close-product" style="position:absolute; left:20px; top:15px; font-size:28px; cursor:pointer;">&times;</span>
        <div id="productDetail"></div>
        <button id="addFromDetailBtn" class="btn-primary">أضف للسلة</button>
    </div>
</div>

<!-- مودال السلة المتطورة -->
<div id="cartModal" class="modal">
    <div class="modal-content">
        <span class="close" style="position:absolute; left:20px; top:15px; font-size:30px; cursor:pointer;">&times;</span>
        <h2>🍣 سلة المشتريات</h2>
        <div id="cartItemsList"></div>
        <div class="cart-summary" id="cartSummary"></div>
        <div class="discount-input">
            <input type="text" id="couponCode" placeholder="كود الخصم (WELCOME10)">
            <button id="applyCouponBtn" class="btn-sm">تطبيق</button>
        </div>
        <div id="loyaltyPointsDiv" class="cart-summary"></div>
        <div class="suggestions" id="suggestionsDiv">
            <strong>اقتراحات ذكية لك:</strong>
            <div id="suggestionsList"></div>
        </div>
        <button id="checkoutBtn" class="btn-primary">إتمام الطلب</button>
    </div>
</div>

<footer style="text-align:center; padding:30px; margin-top:50px;"><p>© 2026 سوشي زن - ذكاء اصطناعي ورياضيات متقدمة</p></footer>

<script>
    // ------------------- بيانات المنيو بصور حقيقية -------------------
    const menuItems = [
        { id: 1, name: "سوشي كاليفورنيا", price: 45, image: "https://source.unsplash.com/featured/?california-roll", category: "لفائف", description: "لفائف السلطعون والأفوكادو والخيار." },
        { id: 2, name: "ساشيمي سلمون", price: 65, image: "https://source.unsplash.com/featured/?salmon-sashimi", category: "ساشيمي", description: "شرائح سلمون طازج." },
        { id: 3, name: "تمورا جمبري", price: 55, image: "https://source.unsplash.com/featured/?shrimp-tempura", category: "مقلي", description: "جمبري مقرمش." },
        { id: 4, name: "سوشي دراغون", price: 85, image: "https://source.unsplash.com/featured/?dragon-roll", category: "لفائف", description: "لفائف الأنقليس والأفوكادو." },
        { id: 5, name: "نوري رول أفوكادو", price: 38, image: "https://source.unsplash.com/featured/?avocado-roll", category: "نباتي", description: "لفائف نباتية." },
        { id: 6, name: "سوشي فوتوماكي", price: 72, image: "https://source.unsplash.com/featured/?futomaki", category: "لفائف", description: "لفائف كبيرة متنوعة." },
        { id: 7, name: "تاتاكي تونة", price: 78, image: "https://source.unsplash.com/featured/?tuna-tataki", category: "ساشيمي", description: "تونة محمرة خفيفاً." },
        { id: 8, name: "ياكيسوبا", price: 48, image: "https://source.unsplash.com/featured/?yakisoba", category: "مقلي", description: "نودلز مقلية." }
    ];

    // سلة التسوق
    let cart = JSON.parse(localStorage.getItem('sushiCart')) || [];
    let appliedDiscount = 0; // نسبة خصم إضافية
    let couponApplied = false;
    let pointsBalance = parseInt(localStorage.getItem('loyaltyPoints')) || 0; // نقاط الولاء

    // حفظ السلة والنقاط
    function saveCart() { localStorage.setItem('sushiCart', JSON.stringify(cart)); }
    function savePoints() { localStorage.setItem('loyaltyPoints', pointsBalance); }

    // حساب إجمالي السلة قبل الخصم
    function getSubtotal() {
        return cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
    }

    // حساب الخصم الديناميكي (10% إذا تجاوز 150 ريال)
    function getDynamicDiscount(subtotal) {
        return subtotal >= 150 ? subtotal * 0.10 : 0;
    }

    // حساب الضريبة 15%
    function getTax(subtotalAfterDynamicDiscount) {
        return (subtotalAfterDynamicDiscount - appliedDiscount) * 0.15;
    }

    // حساب الإجمالي النهائي
    function calculateTotals() {
        let subtotal = getSubtotal();
        let dynamicDiscount = getDynamicDiscount(subtotal);
        let afterDynamic = subtotal - dynamicDiscount;
        let couponDiscount = appliedDiscount;
        let afterCoupon = afterDynamic - couponDiscount;
        let tax = afterCoupon * 0.15;
        let total = afterCoupon + tax;
        let totalSavings = dynamicDiscount + couponDiscount;
        return { subtotal, dynamicDiscount, couponDiscount, tax, total, totalSavings };
    }

    // تحديث واجهة السلة وعرض الرياضيات والذكاء
    function updateCartUI() {
        const cartCountSpan = document.getElementById('cartCount');
        const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
        cartCountSpan.innerText = totalItems;

        const cartItemsDiv = document.getElementById('cartItemsList');
        if (cartItemsDiv) {
            if (cart.length === 0) cartItemsDiv.innerHTML = '<p style="text-align:center">السلة فارغة</p>';
            else {
                cartItemsDiv.innerHTML = '';
                cart.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'cart-item';
                    div.innerHTML = `
                        <div><strong>${item.name}</strong><br>${item.price} ريال × ${item.quantity}</div>
                        <div class="cart-item-controls" style="display:flex; gap:8px;">
                            <button class="cart-qty-btn" data-id="${item.id}" data-delta="-1">-</button>
                            <span>${item.quantity}</span>
                            <button class="cart-qty-btn" data-id="${item.id}" data-delta="1">+</button>
                            <button class="remove-item" data-id="${item.id}">🗑️</button>
                        </div>
                    `;
                    cartItemsDiv.appendChild(div);
                });
                attachCartEvents();
            }
        }
        // عرض ملخص الحسابات
        const summaryDiv = document.getElementById('cartSummary');
        const totals = calculateTotals();
        summaryDiv.innerHTML = `
            <div>المجموع الفرعي: ${totals.subtotal.toFixed(2)} ريال</div>
            <div style="color:#aaffaa;">الخصم الديناميكي (10% للطلبات ≥150): -${totals.dynamicDiscount.toFixed(2)} ريال</div>
            <div style="color:#ffaa66;">خصم الكوبون: -${totals.couponDiscount.toFixed(2)} ريال</div>
            <div>الضريبة (15%): ${totals.tax.toFixed(2)} ريال</div>
            <div style="font-size:1.4rem;"><strong>الإجمالي النهائي: ${totals.total.toFixed(2)} ريال</strong></div>
            <div style="color:#88ff88;">لقد وفرت: ${totals.totalSavings.toFixed(2)} ريال</div>
        `;

        // نقاط الولاء: كل 10 ريال يمنح نقطة (على الإجمالي قبل الخصم)
        const pointsEarned = Math.floor(getSubtotal() / 10);
        document.getElementById('loyaltyPointsDiv').innerHTML = `
            <div>⭐ نقاط الولاء الحالية: ${pointsBalance}</div>
            <div>✨ ستكسب ${pointsEarned} نقطة من هذه الفاتورة</div>
            <button id="redeemPointsBtn" class="btn-sm" style="margin-top:8px;">استبدال 20 نقطة بخصم 5 ريال</button>
        `;
        const redeemBtn = document.getElementById('redeemPointsBtn');
        if(redeemBtn) redeemBtn.onclick = () => redeemPoints();

        // اقتراحات ذكية
        renderSuggestions();

        saveCart();
    }

    function attachCartEvents() {
        document.querySelectorAll('.cart-qty-btn').forEach(btn => {
            btn.onclick = (e) => {
                const id = parseInt(btn.dataset.id);
                const delta = parseInt(btn.dataset.delta);
                changeQuantity(id, delta);
            };
        });
        document.querySelectorAll('.remove-item').forEach(btn => {
            btn.onclick = () => {
                const id = parseInt(btn.dataset.id);
                removeItemCompletely(id);
            };
        });
    }

    function changeQuantity(id, delta) {
        const idx = cart.findIndex(i => i.id === id);
        if(idx !== -1) {
            cart[idx].quantity += delta;
            if(cart[idx].quantity <= 0) cart.splice(idx,1);
            updateCartUI();
            renderMenu();
        }
    }
    function removeItemCompletely(id) {
        cart = cart.filter(i => i.id !== id);
        updateCartUI();
        renderMenu();
    }

    // استبدال النقاط
    function redeemPoints() {
        if(pointsBalance >= 20) {
            pointsBalance -= 20;
            appliedDiscount += 5;
            savePoints();
            updateCartUI();
            showToast(`✨ تم استبدال 20 نقطة بخصم 5 ريال`);
        } else {
            showToast(`⚠️ ليس لديك نقاط كافية (تحتاج 20 نقطة)`);
        }
    }

    // تطبيق كوبون خصم
    function applyCoupon(code) {
        if(code === "WELCOME10" && !couponApplied) {
            appliedDiscount += 10;
            couponApplied = true;
            updateCartUI();
            showToast("🎉 كود WELCOME10 فعّال! خصم 10 ريال");
        } else if(couponApplied) showToast("الكود استخدم سابقاً");
        else showToast("كود غير صالح");
    }

    // إضافة للسلة
    function addToCart(id, name, price) {
        const existing = cart.find(i => i.id === id);
        if(existing) existing.quantity++;
        else cart.push({ id, name, price, quantity: 1 });
        updateCartUI();
        renderMenu();
        showToast(`✅ أضيف ${name} إلى السلة`);
    }

    // اقتراحات ذكية (تحليل السلة)
    function renderSuggestions() {
        const suggestionsDiv = document.getElementById('suggestionsList');
        if(!suggestionsDiv) return;
        const cartIds = cart.map(i => i.id);
        let suggestedProducts = [];
        if(cartIds.includes(1)) suggestedProducts.push(menuItems.find(i=>i.id===3)); // كاليفورنيا + تمورا
        if(cartIds.includes(2)) suggestedProducts.push(menuItems.find(i=>i.id===7)); // سلمون + تونة
        if(cartIds.length === 0) suggestedProducts = menuItems.slice(0,2);
        suggestedProducts = suggestedProducts.filter(p => p && !cartIds.includes(p.id));
        suggestedProducts = [...new Map(suggestedProducts.map(p=>[p.id,p])).values()].slice(0,3);
        if(suggestedProducts.length===0) suggestionsDiv.innerHTML = '<span>أضف منتجات لاقتراحات مخصصة</span>';
        else {
            suggestionsDiv.innerHTML = suggestedProducts.map(p => 
                `<span class="suggestion-item" data-id="${p.id}" data-name="${p.name}" data-price="${p.price}">➕ ${p.name} (${p.price} ريال)</span>`
            ).join('');
            document.querySelectorAll('.suggestion-item').forEach(el => {
                el.addEventListener('click', () => {
                    const id = parseInt(el.dataset.id);
                    const name = el.dataset.name;
                    const price = parseInt(el.dataset.price);
                    addToCart(id, name, price);
                });
            });
        }
    }

    // عرض المنيو مع الصور الحقيقية
    let currentFilter = "all", currentSearch = "";
    function renderMenu() {
        let filtered = menuItems.filter(item => {
            const matchCat = currentFilter === "all" || item.category === currentFilter;
            const matchSearch = item.name.includes(currentSearch) || item.description.includes(currentSearch);
            return matchCat && matchSearch;
        });
        const container = document.getElementById('menuContainer');
        if(!container) return;
        container.innerHTML = '';
        filtered.forEach(item => {
            const inCart = cart.find(c => c.id === item.id);
            const btnText = inCart ? `✅ موجود (${inCart.quantity})` : "➕ أضف للسلة";
            const card = document.createElement('div');
            card.className = 'menu-card';
            card.dataset.id = item.id;
            card.innerHTML = `
                <img class="card-img" src="${item.image}" alt="${item.name}" onerror="this.src='https://via.placeholder.com/300x180?text=Sushi'">
                <h3>${item.name}</h3>
                <p class="price">${item.price} ريال</p>
                <button class="btn-add" data-id="${item.id}" data-name="${item.name}" data-price="${item.price}">${btnText}</button>
            `;
            container.appendChild(card);
        });
        document.querySelectorAll('.btn-add').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                addToCart(parseInt(btn.dataset.id), btn.dataset.name, parseInt(btn.dataset.price));
            });
        });
        document.querySelectorAll('.menu-card').forEach(card => {
            card.addEventListener('click', (e) => {
                if(e.target.classList.contains('btn-add')) return;
                const id = parseInt(card.dataset.id);
                showProductDetail(id);
            });
        });
    }

    function showProductDetail(id) {
        const item = menuItems.find(i=>i.id===id);
        if(!item) return;
        const detailDiv = document.getElementById('productDetail');
        detailDiv.innerHTML = `
            <img src="${item.image}" style="width:100%; border-radius:40px; max-height:200px; object-fit:cover;">
            <h2>${item.name}</h2>
            <p>${item.description}</p>
            <p class="price">${item.price} ريال</p>
        `;
        document.getElementById('productModal').style.display = 'flex';
        document.getElementById('addFromDetailBtn').onclick = () => {
            addToCart(item.id, item.name, item.price);
            document.getElementById('productModal').style.display = 'none';
        };
    }

    // تبديل الصفحات وغيرها
    function switchPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(pageId+'Page').classList.add('active-page');
        document.querySelectorAll('nav a[data-page]').forEach(l => l.classList.remove('active'));
        document.querySelector(`nav a[data-page="${pageId}"]`).classList.add('active');
    }

    // إشعارات
    function showToast(msg) {
        let toast = document.createElement('div');
        toast.innerText = msg;
        toast.style.position = 'fixed';
        toast.style.bottom = '30px';
        toast.style.left = '50%';
        toast.style.transform = 'translateX(-50%)';
        toast.style.backgroundColor = '#ff884d';
        toast.style.color = '#0a0a0a';
        toast.style.padding = '12px 25px';
        toast.style.borderRadius = '50px';
        toast.style.zIndex = '2000';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    // الأحداث
    document.getElementById('applyCouponBtn').onclick = () => {
        const code = document.getElementById('couponCode').value.trim();
        applyCoupon(code);
    };
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.cat;
            renderMenu();
        };
    });
    document.getElementById('searchInput').addEventListener('input', (e) => {
        currentSearch = e.target.value;
        renderMenu();
    });
    const cartModal = document.getElementById('cartModal');
    document.getElementById('cartIconBtn').onclick = (e) => {
        e.preventDefault();
        updateCartUI();
        cartModal.style.display = 'flex';
    };
    document.querySelector('.close').onclick = () => cartModal.style.display = 'none';
    document.querySelector('.close-product').onclick = () => document.getElementById('productModal').style.display = 'none';
    window.onclick = (e) => {
        if(e.target === cartModal) cartModal.style.display = 'none';
        if(e.target === document.getElementById('productModal')) document.getElementById('productModal').style.display = 'none';
    };
    document.getElementById('checkoutBtn').onclick = () => {
        if(cart.length===0){ showToast('السلة فارغة'); return; }
        const totals = calculateTotals();
        const earnedPoints = Math.floor(getSubtotal()/10);
        pointsBalance += earnedPoints;
        savePoints();
        showToast(`شكراً! تم إتمام الطلب بمبلغ ${totals.total.toFixed(2)} ريال، ربحت ${earnedPoints} نقطة.`);
        cart = [];
        appliedDiscount = 0;
        couponApplied = false;
        updateCartUI();
        renderMenu();
        cartModal.style.display = 'none';
    };
    document.querySelectorAll('nav a[data-page]').forEach(link => {
        link.onclick = (e) => {
            e.preventDefault();
            switchPage(link.dataset.page);
        };
    });
    // بدء
    renderMenu();
    updateCartUI();
    switchPage('menu');
</script>
</body>
</html>
