<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sushi Store</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
        }
        header {
            background-color: #ff6347;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .container {
            width: 80%;
            margin: auto;
            overflow: hidden;
        }
        .product {
            float: left;
            width: 30%;
            margin: 20px;
            padding: 10px;
            background-color: white;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        footer {
            clear: both;
            background-color: #333;
            color: white;
            text-align: center;
            padding: 10px 0;
            position: relative;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to Sushi Store</h1>
        <p>Your favorite sushi delivered fresh!</p>
    </header>
    <div class="container">
        <div class="product">
            <h2>California Roll</h2>
            <p>Price: $8.99</p>
            <button onclick="addToCart('California Roll', 8.99)">Add to Cart</button>
        </div>
        <div class="product">
            <h2>Spicy Tuna Roll</h2>
            <p>Price: $9.99</p>
            <button onclick="addToCart('Spicy Tuna Roll', 9.99)">Add to Cart</button>
        </div>
        <div class="product">
            <h2>Salmon Nigiri</h2>
            <p>Price: $10.99</p>
            <button onclick="addToCart('Salmon Nigiri', 10.99)">Add to Cart</button>
        </div>
    </div>
    <footer>
        <p>Contact us: info@sushistore.com</p>
    </footer>
    <script>
        function addToCart(productName, price) {
            alert(productName + ' has been added to your cart for $' + price);
        }
    </script>
</body>
</html>
