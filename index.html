<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sakura Sushi — Premium Omakase</title>
  <meta name="description" content="Experience Tokyo's finest omakase tradition delivered to your door. Freshly sourced ingredients, masterful technique, uncompromising quality." />
  <meta property="og:title" content="Sakura Sushi — Premium Omakase" />
  <meta property="og:description" content="Premium Japanese sushi experience delivered to your door." />
  <meta name="theme-color" content="#111827" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ====== NAVIGATION ====== -->
<nav id="nav">
  <div class="container nav-inner">
    <!-- Logo -->
    <div class="nav-logo" onclick="navigate('/')">
      <div class="nav-logo-circle">S</div>
      <span class="nav-logo-text">SAKURA SUSHI</span>
    </div>

    <!-- Desktop Links -->
    <div class="nav-links">
      <span class="nav-link" data-href="/" onclick="navigate('/')">HOME</span>
      <span class="nav-link" data-href="/menu" onclick="navigate('/menu')">MENU</span>
      <button class="nav-cart-btn" onclick="navigate('/cart')" title="Cart">
        <svg viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        <span class="cart-badge">0</span>
      </button>
    </div>

    <!-- Mobile Hamburger -->
    <button class="nav-hamburger" onclick="toggleMobileMenu()" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>

  <!-- Mobile Dropdown -->
  <div class="mobile-menu" id="mobileMenu">
    <span class="nav-link" data-href="/" onclick="navigate('/')">HOME</span>
    <span class="nav-link" data-href="/menu" onclick="navigate('/menu')">MENU</span>
    <div class="mobile-cart-row">
      <span class="nav-link" data-href="/cart" onclick="navigate('/cart')">CART</span>
      <span class="cart-badge visible" style="position:static;transform:none;opacity:1">0</span>
    </div>
  </div>
</nav>

<!-- ====== APP CONTENT ====== -->
<div id="app"></div>

<!-- ====== TOAST ====== -->
<div id="toast" class="toast">
  <p class="toast-title"></p>
  <p class="toast-body"></p>
</div>

<script src="script.js"></script>
</body>
</html>
